name: Other issue
description: Anything that isn't a formatting bug or request — a feature idea, a question, docs, tooling.
labels: [triage]
body:
  - type: markdown
    attributes:
      value: |
        For SQL that formats wrong (or a construct you want formatted a certain way), please use the
        **Formatting bug or request** template instead — it captures the input/expected pair we need.
  - type: dropdown
    id: kind
    attributes:
      label: What kind of issue is this?
      options:
        - Feature idea
        - Question
        - Documentation
        - Tooling / build / CI
        - Other
    validations:
      required: true
  - type: textarea
    id: details
    attributes:
      label: Details
      description: >
        Describe it as fully as you can — what you're trying to do, what you expected, and what
        actually happens. Include steps, examples, or links where they help.
    validations:
      required: true
  - type: textarea
    id: context
    attributes:
      label: Environment / context
      description: Extension version, VS Code version, OS — whatever is relevant. Optional.
    validations:
      required: false
