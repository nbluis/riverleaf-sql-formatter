version: 2
updates:
  # npm dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    # Security: wait 14 days after a version is published before opening an
    # update PR, so a freshly released (possibly compromised) version has time
    # to be flagged/yanked before it reaches this repo.
    cooldown:
      default-days: 14
    open-pull-requests-limit: 10
    groups:
      npm:
        patterns:
          - "*"

  # GitHub Actions used by the workflows in .github/workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 14
    groups:
      github-actions:
        patterns:
          - "*"
