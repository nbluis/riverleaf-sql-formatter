# LATERAL derived tables (subquery with a LATERAL prefix). Expand recursively
# like a plain ( subquery ), in every position: join / cross join / from / a
# from-list item. `lateral` is a keyword (kept apart from its '(' — not glued as
# a function call).
- description: a left join lateral (subquery) expands, alias + single ON on the ) line
  input: select p.id from planets p left join lateral(select max(mass) as top from moons m where m.planet_id = p.id) as last on true
  expected: |
    select p.id
      from planets p
      left join lateral (
        select max(mass) as top
          from moons m
         where m.planet_id = p.id
      ) as last on true
- description: a cross join lateral (subquery) expands
  input: select p.id from planets p cross join lateral(select sum(mass) as total from moons m where m.planet_id = p.id) x
  expected: |
    select p.id
      from planets p
     cross join lateral (
       select sum(mass) as total
         from moons m
        where m.planet_id = p.id
     ) x
- description: a from lateral (subquery) alias expands, closing ) under from
  input: select x.a from lateral(select id as a from planets where planets.star_id = 1) x
  expected: |
    select x.a
      from lateral (
        select id as a
          from planets
         where planets.star_id = 1
      ) x
- description: a lateral item in a from list expands at the item column
  input: select stars.a, x.b from stars, lateral(select id as b from planets where planets.star_id = stars.id) x
  expected: |
    select stars.a,
           x.b
      from stars,
           lateral (
             select id as b
               from planets
              where planets.star_id = stars.id
           ) x
- description: a join lateral (subquery) with a multi-condition ON keeps the ON river
  input: select p.id from planets p join lateral(select id from moons) x on x.id = p.id and x.id > 0
  expected: |
    select p.id
      from planets p
      join lateral (
        select id
          from moons
      ) x on x.id = p.id
         and x.id > 0
