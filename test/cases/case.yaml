- description: a case expression in the select list expands, when/else/end share the case column
  input: select case when status_id = 1 then 'paid' when status_id = 2 then 'pending' else 'other' end as label from orders
  expected: |
    select case
           when status_id = 1 then 'paid'
           when status_id = 2 then 'pending'
           else 'other'
           end as label
      from orders
- description: a case among other columns breaks the list and expands at the item column
  input: select id, case when status_id = 1 then 'paid' else 'other' end as label, total from orders
  expected: |
    select id,
           case
           when status_id = 1 then 'paid'
           else 'other'
           end as label,
           total
      from orders
- description: a simple case keeps its selector on the case line
  input: select case status_id when 1 then 'paid' when 2 then 'pending' end as label from orders
  expected: |
    select case status_id
           when 1 then 'paid'
           when 2 then 'pending'
           end as label
      from orders
- description: a case without an alias ends on a bare end
  input: select case when status_id = 1 then 'paid' else 'other' end from orders
  expected: |
    select case
           when status_id = 1 then 'paid'
           else 'other'
           end
      from orders
- description: a nested case keeps the inner case inline on its branch
  input: select case when priority_level = 1 then case when is_paid then 'paid' else 'unpaid' end else 'standard' end as label from orders
  expected: |
    select case
           when priority_level = 1 then case when is_paid then 'paid' else 'unpaid' end
           else 'standard'
           end as label
      from orders
