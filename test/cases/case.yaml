- description: a case expression in the select list expands, when/else/end share the case column
  input: select case when status_id = 1 then 'paid' when status_id = 2 then 'pending' else 'other' end as label from orders
  expected: |
    select case
           when status_id = 1 then 'paid'
           when status_id = 2 then 'pending'
           else 'other'
           end as label
      from orders
- description: a case among other columns breaks the list and expands at the item column
  input: select id, case when status_id = 1 then 'paid' else 'other' end as label, total from orders
  expected: |
    select id,
           case
           when status_id = 1 then 'paid'
           else 'other'
           end as label,
           total
      from orders
- description: a simple case keeps its selector on the case line
  input: select case status_id when 1 then 'paid' when 2 then 'pending' end as label from orders
  expected: |
    select case status_id
           when 1 then 'paid'
           when 2 then 'pending'
           end as label
      from orders
- description: a case without an alias ends on a bare end
  input: select case when status_id = 1 then 'paid' else 'other' end from orders
  expected: |
    select case
           when status_id = 1 then 'paid'
           else 'other'
           end
      from orders
- description: a nested case in a then-branch expands recursively at the inner case column
  input: select case when priority = 1 then case when is_paid then 'a' else 'b' end else 'c' end as label from orders
  expected: |
    select case
           when priority = 1 then case
                                  when is_paid then 'a'
                                  else 'b'
                                  end
           else 'c'
           end as label
      from orders
- description: a case in a where condition expands at the operand column, tail after end
  input: select id from orders where case when status_id = 1 then total else 0 end > 100
  expected: |
    select id
      from orders
     where case
           when status_id = 1 then total
           else 0
           end > 100
- description: a case in an order by item expands at the item column
  input: select id from orders order by case when status_id = 1 then 0 else 1 end
  expected: |
    select id
      from orders
     order by case
              when status_id = 1 then 0
              else 1
              end
- description: a long when ... then breaks before then, both at the case column
  input: select case when customer_lifetime_value > 100000 and region_code = 'LATAM' then 'platinum-latam-priority-segment' else 'std' end as seg from customers
  expected: |
    select case
           when customer_lifetime_value > 100000 and region_code = 'LATAM'
           then 'platinum-latam-priority-segment'
           else 'std'
           end as seg
      from customers
- description: only the long when wraps; a short when and a fitting else stay inline
  input: select case when total_amount > 100000 and status_code = 'ACTIVE' then 'high-value-active-account' when total_amount > 0 then 'ok' else 'zero-balance-inactive-placeholder-value' end as seg from customers
  expected: |
    select case
           when total_amount > 100000 and status_code = 'ACTIVE'
           then 'high-value-active-account'
           when total_amount > 0 then 'ok'
           else 'zero-balance-inactive-placeholder-value'
           end as seg
      from customers
- description: a case in a single join ON condition expands
  input: select o.id from orders o join customers c on case when c.vip then 1 else 0 end = 1
  expected: |
    select o.id
      from orders o
      join customers c on case
                          when c.vip then 1
                          else 0
                          end = 1
- description: a case in a multi-condition join ON expands
  input: select o.id from orders o join customers c on c.active = true and case when c.vip then 1 else 0 end = 1
  expected: |
    select o.id
      from orders o
      join customers c on c.active = true
                      and case
                          when c.vip then 1
                          else 0
                          end = 1
