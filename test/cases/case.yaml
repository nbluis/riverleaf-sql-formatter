- description: a case expression in the select list expands, when/else/end share the case column
  input: select case when status_id = 1 then 'confirmed' when status_id = 2 then 'candidate' else 'disputed' end as label from planets
  expected: |
    select case
           when status_id = 1 then 'confirmed'
           when status_id = 2 then 'candidate'
           else 'disputed'
           end as label
      from planets
- description: a case among other columns breaks the list and expands at the item column
  input: select id, case when status_id = 1 then 'confirmed' else 'disputed' end as label, mass from planets
  expected: |
    select id,
           case
           when status_id = 1 then 'confirmed'
           else 'disputed'
           end as label,
           mass
      from planets
- description: a simple case keeps its selector on the case line
  input: select case status_id when 1 then 'confirmed' when 2 then 'candidate' end as label from planets
  expected: |
    select case status_id
           when 1 then 'confirmed'
           when 2 then 'candidate'
           end as label
      from planets
- description: a case without an alias ends on a bare end
  input: select case when status_id = 1 then 'confirmed' else 'disputed' end from planets
  expected: |
    select case
           when status_id = 1 then 'confirmed'
           else 'disputed'
           end
      from planets
- description: a nested case in a then-branch expands recursively at the inner case column
  input: select case when moon_count = 1 then case when is_habitable then 'giant' else 'dwarf' end else 'unknown' end as label from planets
  expected: |
    select case
           when moon_count = 1 then case
                                    when is_habitable then 'giant'
                                    else 'dwarf'
                                    end
           else 'unknown'
           end as label
      from planets
- description: a case in a where condition expands at the operand column, tail after end
  input: select id from planets where case when status_id = 1 then mass else 0 end > 100
  expected: |
    select id
      from planets
     where case
           when status_id = 1 then mass
           else 0
           end > 100
- description: a case in an order by item expands at the item column
  input: select id from planets prder by case when status_id = 1 then 0 else 1 end
  expected: |
    select id
      from planets prder by case when status_id = 1 then 0 else 1 end
- description: a long when ... then grows on one line (never wrapped — breaking is by rule)
  input: select case when luminosity > 100000 and spectral_class = 'M' then 'supergiant-high-luminosity-class' else 'dwarf' end as seg from stars
  expected: |
    select case
           when luminosity > 100000 and spectral_class = 'M' then 'supergiant-high-luminosity-class'
           else 'dwarf'
           end as seg
      from stars
- description: every when ... then grows on its own line, however long
  input: select case when mass > 100000 and status = 'active' then 'high-luminosity-active-supergiant' when mass > 0 then 'ok' else 'zero-luminosity-inactive-placeholder-value' end as seg from stars
  expected: |
    select case
           when mass > 100000 and status = 'active' then 'high-luminosity-active-supergiant'
           when mass > 0 then 'ok'
           else 'zero-luminosity-inactive-placeholder-value'
           end as seg
      from stars
- description: a case in a single join ON condition expands
  input: select p.id from planets p join stars s on case when s.is_visible then 1 else 0 end = 1
  expected: |
    select p.id
      from planets p
      join stars s on case
                      when s.is_visible then 1
                      else 0
                      end = 1
- description: a case in a multi-condition join ON expands
  input: select p.id from planets p join stars s on s.is_active = true and case when s.is_visible then 1 else 0 end = 1
  expected: |
    select p.id
      from planets p
      join stars s on s.is_active = true
                  and case
                      when s.is_visible then 1
                      else 0
                      end = 1
