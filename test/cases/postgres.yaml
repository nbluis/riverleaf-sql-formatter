# Riverleaf formatting cases. Each entry: description, optional options,
# input (unformatted) and expected (formatted). The test runner loads every
# *.yaml file in this directory and asserts format(input, options) === expected.
- description: river alignment with a broken join (nested OR group) and a multi-condition where
  input: |2
        select observed_month as previous_observed_month
        from monthly_observation_summaries previous_summary
        join stars on stars.star_id = previous_summary.star_id
        left join planets on planets.star_id = stars.star_id and planets.type = stars.default_type and planets.apparent_magnitude between 1 and 2 and (planets.constellation_id = stars.constellation_id or planets.catalog_number = stars.catalog_number)
        where previous_summary.galaxy_id = current_summary.galaxy_id and previous_summary.galaxy_id = 220 and previous_summary.star_id = current_summary.star_id and previous_summary.observed_month < current_summary.observed_month and previous_summary.observation_count > 0
        order by observed_month desc
        limit 1
  expected: |
    select observed_month as previous_observed_month
      from monthly_observation_summaries previous_summary
      join stars on stars.star_id = previous_summary.star_id
      left join planets on planets.star_id = stars.star_id
                       and planets.type = stars.default_type
                       and planets.apparent_magnitude between 1 and 2
                       and (
                         planets.constellation_id = stars.constellation_id
                      or planets.catalog_number = stars.catalog_number
                       )
     where previous_summary.galaxy_id = current_summary.galaxy_id
       and previous_summary.galaxy_id = 220
       and previous_summary.star_id = current_summary.star_id
       and previous_summary.observed_month < current_summary.observed_month
       and previous_summary.observation_count > 0
     order by observed_month desc
     limit 1
- description: an expanded OR group aligns its connectors to the group river (RIVER, D1)
  input: select id from planets where (status_id = 1 or status_id = 2 or status_id = 3) and mass > 0
  expected: |
    select id
      from planets
     where (
             status_id = 1
          or status_id = 2
          or status_id = 3
           )
       and mass > 0
- description: a multi-column select breaks one column per line
  input: select name, designation, catalog_number from stars
  expected: |
    select name,
           designation,
           catalog_number
      from stars
- description: a single-column select stays inline (nothing to break)
  input: select name from stars
  expected: |
    select name
      from stars
- description: a from list with more than one table breaks one per line
  input: select id from planets p, stars s
  expected: |
    select id
      from planets p,
           stars s
- description: a three-column select breaks with trailing commas
  input: select name, mass, radius from moons
  expected: |
    select name,
           mass,
           radius
      from moons
- description: keywords lowercased, identifiers preserved
  input: SELECT StarName FROM Stars
  expected: |
    select StarName
      from Stars
- description: a single-condition join stays inline (nothing to align)
  input: select id from planets join stars on stars.id = planets.star_id
  expected: |
    select id
      from planets
      join stars on stars.id = planets.star_id
- description: a multi-condition join always breaks, aligning and/or under on (even when it fits)
  input: select planets.mass, stars.radius from table1 join table2 on stars.id = planets.star_id and stars.parent_id is null
  expected: |
    select planets.mass,
           stars.radius
      from table1
      join table2 on stars.id = planets.star_id
                 and stars.parent_id is null
- description: no space before ( in function calls
  input: select coalesce(call_sign, given_name), count(*) from astronauts where status_id in (1, 2, 3)
  expected: |
    select coalesce(call_sign, given_name),
           count(*)
      from astronauts
     where status_id in (1, 2, 3)
- description: line comment after a select column is kept as an end-of-line comment while the rest is formatted
  input: |-
    select star_id, -- primary key
           mass
      from planets
  expected: |
    select star_id, -- primary key
           mass
      from planets
- description: trailing line comment is kept
  input: select mass from stars -- snapshot
  expected: |
    select mass
      from stars -- snapshot
- description: trailing line comment on a where condition is kept
  input: select id from planets where status_id = 1 -- only active planets
  expected: |
    select id
      from planets
     where status_id = 1 -- only active planets
- description: an inline comment in the middle of a where breaks and stays on its condition line
  input: |
    select id from planets where status_id = 1 -- filter
    and mass > 0
  expected: |
    select id
      from planets
     where status_id = 1 -- filter
       and mass > 0
- description: an inline comment on the last where condition rides its line when the where breaks
  input: select id from planets where status_id = 1 and mass > 0 -- note
  expected: |
    select id
      from planets
     where status_id = 1
       and mass > 0 -- note
- description: a where with a single condition stays inline
  input: select id from planets where status_id = 1
  expected: |
    select id
      from planets
     where status_id = 1
- description: a where that is a single parenthesized group always expands (D-c)
  input: select id from planets where (status_id = 1 or status_id = 2)
  expected: |
    select id
      from planets
     where (
             status_id = 1
          or status_id = 2
           )
- description: a standalone comment between where conditions sits at the content column
  input: |
    select id from planets
    where status_id = 1
    -- standalone note
    and mass > 0
  expected: |
    select id
      from planets
     where status_id = 1
           -- standalone note
       and mass > 0
- description: a standalone comment inside a parenthesized group reflows in BLOCK mode
  input: |
    select id from planets
    where (status_id = 1
    -- inside the group
    or status_id = 2)
    and mass > 0
  expected: |
    select id
      from planets
     where (
             status_id = 1
             -- inside the group
          or status_id = 2
           )
       and mass > 0
- description: an inline comment on a condition inside a parenthesized group is kept
  input: |
    select id from planets
    where (status_id = 1
    or status_id = 2 -- second option
    )
    and mass > 0
  expected: |
    select id
      from planets
     where (
             status_id = 1
          or status_id = 2 -- second option
           )
       and mass > 0
- description: a leading standalone comment inside a parenthesized group is kept
  input: |
    select id from planets
    where (
    -- head of group
    status_id = 1
    or status_id = 2)
    and mass > 0
  expected: |
    select id
      from planets
     where (
             -- head of group
             status_id = 1
          or status_id = 2
           )
       and mass > 0
- description: a standalone comment before the first where condition keeps where alone (option b)
  input: |
    select id from planets
    where
    -- standalone note before first
    status_id = 1
    and mass > 0
  expected: |
    select id
      from planets
     where
           -- standalone note before first
           status_id = 1
       and mass > 0
- description: a standalone comment between join ON conditions reflows under the on river
  input: |
    select id from planets p
    join stars s on s.id = p.star_id
    -- note between on conditions
    and s.is_active = true
  expected: |
    select id
      from planets p
      join stars s on s.id = p.star_id
                      -- note between on conditions
                  and s.is_active = true
- description: multiple statements separated by a blank line
  input: select current_date; select id from planets
  expected: |
    select current_date;

    select id
      from planets
- description: group by / having / order by alignment
  input: select station_id, count(*) from astronauts group by station_id having count(*) > 5 order by station_id
  expected: |
    select station_id,
           count(*)
      from astronauts
     group by station_id
    having count(*) > 5
     order by station_id
- description: a leading line comment stays on its own line and does not pollute the river
  input: |
    -- comment
    select planets.discovered_at as discovered_date, planets.discovered_at as date, planets.galaxy_id
      from planets
  expected: |
    -- comment
    select planets.discovered_at as discovered_date,
           planets.discovered_at as date,
           planets.galaxy_id
      from planets
- description: an inline comment on the last select column is kept while the list breaks
  input: |
    select planets.discovered_at as discovered_date, planets.discovered_at as date, planets.galaxy_id -- last token comment
      from planets
  expected: |
    select planets.discovered_at as discovered_date,
           planets.discovered_at as date,
           planets.galaxy_id -- last token comment
      from planets
- description: a standalone comment between list items and a trailing statement comment sit at the content column
  input: |
    select planets.discovered_at as discovered_date, planets.discovered_at as date,
           -- line with comment
           planets.galaxy_id
      from planets
    -- line with comment
  expected: |
    select planets.discovered_at as discovered_date,
           planets.discovered_at as date,
           -- line with comment
           planets.galaxy_id
      from planets
           -- line with comment
- description: a standalone comment between clauses sits at the content column
  input: |
    select star_id from planets
    -- only active planets
    where status_id = 1
  expected: |
    select star_id
      from planets
           -- only active planets
     where status_id = 1
- description: a line comment after the final semicolon glues under the statement
  input: |
    select star_id from planets;
    -- done
  expected: |
    select star_id
      from planets;
    -- done
- description: each statement keeps its own leading comment, separated by a blank line
  input: |
    -- first query
    select id from planets;
    -- second query
    select star_id from stars
  expected: |
    -- first query
    select id
      from planets;

    -- second query
    select star_id
      from stars
- description: an indented query is normalized to column 0 (D2)
  input: |2
        select id, mass
        from planets
        where status_id = 1
        order by mass desc
  expected: |
    select id,
           mass
      from planets
     where status_id = 1
     order by mass desc
