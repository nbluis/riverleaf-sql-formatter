- description: from ( subquery ) alias expands, closing ) aligned under from
  input: select x.id, x.total from (select id, sum(amount) as total from orders group by id) x where x.total > 100
  expected: |
    select x.id, x.total
      from (
        select id, sum(amount) as total
          from orders
         group by id
      ) x
     where x.total > 100
- description: a single CTE body expands, closing ) aligned under with
  input: with recent as (select id from orders where created_at > now() - interval '7 days') select id from recent
  expected: |2
      with recent as (
        select id
          from orders
         where created_at > now() - interval '7 days'
      )
    select id
      from recent
- description: where ... in ( subquery ) expands under the where keyword
  input: select id from orders where customer_id in (select customer_id from vip_customers where active = true)
  expected: |
    select id
      from orders
     where customer_id in (
       select customer_id
         from vip_customers
        where active = true
     )
- description: nested subqueries expand recursively
  input: select t.id from (select id from (select id from orders where status_id = 1) inner_q where id > 0) t
  expected: |
    select t.id
      from (
        select id
          from (
            select id
              from orders
             where status_id = 1
          ) inner_q
         where id > 0
      ) t
- description: a subquery containing a multi-condition join keeps the ON river
  input: select x.id from (select o.id from orders o join customers c on c.id = o.customer_id and c.active = true) x
  expected: |
    select x.id
      from (
        select o.id
          from orders o
          join customers c on c.id = o.customer_id
                          and c.active = true
      ) x
- description: a subquery in the first of several where conditions expands, rest below
  input: select id from orders where customer_id in (select customer_id from vip_customers where active = true) and status_id = 1
  expected: |
    select id
      from orders
     where customer_id in (
       select customer_id
         from vip_customers
        where active = true
     )
       and status_id = 1
- description: a subquery in a non-first where condition expands, ) under the connector
  input: select id from orders where order_status_id = 1 and customer_id in (select customer_id from vip_customers where active = true)
  expected: |
    select id
      from orders
     where order_status_id = 1
       and customer_id in (
         select customer_id
           from vip_customers
          where active = true
       )
- description: a subquery in a multi-condition join ON expands, ) under the connector
  input: select o.id from orders o join customers c on c.id = o.customer_id and c.id in (select id from vip_customers)
  expected: |
    select o.id
      from orders o
      join customers c on c.id = o.customer_id
                      and c.id in (
                        select id
                          from vip_customers
                      )
- description: a scalar subquery in the select list expands at the item column
  input: select id, (select count(*) from order_items oi where oi.order_id = orders.id) as item_count from orders
  expected: |
    select id,
           (
             select count(*)
               from order_items oi
              where oi.order_id = orders.id
           ) as item_count
      from orders
- description: a subquery wrapped in a function in the select list stays inline
  input: select id, coalesce((select max(amount) from order_items oi where oi.order_id = orders.id), 0) as top from orders
  expected: |
    select id,
           coalesce((select max(amount) from order_items oi where oi.order_id = orders.id), 0) as top
      from orders
- description: a subquery as a join table expands, alias and single ON on the ) line
  input: select o.id from orders o join (select customer_id from vip_customers) v on v.customer_id = o.customer_id
  expected: |
    select o.id
      from orders o
      join (
        select customer_id
          from vip_customers
      ) v on v.customer_id = o.customer_id
- description: a join-table subquery with a multi-condition ON keeps the ON river on the ) line
  input: select o.id from orders o join (select customer_id from vip_customers) v on v.customer_id = o.customer_id and v.tier = o.tier
  expected: |
    select o.id
      from orders o
      join (
        select customer_id
          from vip_customers
      ) v on v.customer_id = o.customer_id
         and v.tier = o.tier
