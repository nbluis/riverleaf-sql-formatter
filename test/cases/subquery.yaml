- description: multiple comma-separated CTEs each expand, names recede to the with column
  input: with a as (select id from planet), b as (select id from star) select a.id from a join b on a.id = b.id
  expected: |
    with a as (
      select id
        from planet
    ),
    b as (
      select id
        from star
    )
    select a.id
      from a
      join b on a.id = b.id
- description: 'three CTEs: each ) aligns under with, comma after each ) but the last'
  input: with a as (select id from planet), b as (select id from star), c as (select id from galaxy) select a.id from a
  expected: |
    with a as (
      select id
        from planet
    ),
    b as (
      select id
        from star
    ),
    c as (
      select id
        from galaxy
    )
    select a.id
      from a
- description: multiple CTEs with inner where clauses expand recursively
  input: with a as (select id from planet where status_id = 1), b as (select star_id from star where is_active = true) select a.id from a join b on a.id = b.star_id where a.id > 0
  expected: |
    with a as (
      select id
        from planet
       where status_id = 1
    ),
    b as (
      select star_id
        from star
       where is_active = true
    )
    select a.id
      from a
      join b on a.id = b.star_id
     where a.id > 0
