# Subqueries (non-CTE): from ( ... ) alias, a where condition subquery in any
# position, a join ON subquery, a join-table subquery, a scalar subquery in the
# select list, a function-wrapped subquery (stays inline), and comments inside
# each expanded subquery. CTEs live in cte.yaml.
- description: from ( subquery ) alias expands, closing ) aligned under from
  input: select x.id, x.total from (select id, sum(mass) as total from planets group by id) x where x.total > 100
  expected: |
    select x.id,
           x.total
      from (
        select id,
               sum(mass) as total
          from planets
         group by id
      ) x
     where x.total > 100
- description: where ... in ( subquery ) expands under the where keyword
  input: select id from planets where star_id in (select star_id from nearby_stars where is_active = true)
  expected: |
    select id
      from planets
     where star_id in (
       select star_id
         from nearby_stars
        where is_active = true
     )
- description: nested subqueries expand recursively
  input: select t.id from (select id from (select id from planets where status_id = 1) inner_q where id > 0) t
  expected: |
    select t.id
      from (
        select id
          from (
            select id
              from planets
             where status_id = 1
          ) inner_q
         where id > 0
      ) t
- description: a subquery containing a multi-condition join keeps the ON river
  input: select x.id from (select p.id from planets p join stars s on s.id = p.star_id and s.is_active = true) x
  expected: |
    select x.id
      from (
        select p.id
          from planets p
          join stars s on s.id = p.star_id
                      and s.is_active = true
      ) x
- description: a subquery in the first of several where conditions expands, rest below
  input: select id from planets where star_id in (select star_id from nearby_stars where is_active = true) and status_id = 1
  expected: |
    select id
      from planets
     where star_id in (
       select star_id
         from nearby_stars
        where is_active = true
     )
       and status_id = 1
- description: a subquery in a non-first where condition expands, ) under the connector
  input: select id from planets where status_id = 1 and star_id in (select star_id from nearby_stars where is_active = true)
  expected: |
    select id
      from planets
     where status_id = 1
       and star_id in (
         select star_id
           from nearby_stars
          where is_active = true
       )
- description: a subquery in a multi-condition join ON expands, ) under the connector
  input: select p.id from planets p join stars s on s.id = p.star_id and s.id in (select id from nearby_stars)
  expected: |
    select p.id
      from planets p
      join stars s on s.id = p.star_id
                  and s.id in (
                    select id
                      from nearby_stars
                  )
- description: a scalar subquery in the select list expands at the item column
  input: select id, (select count(*) from moons m where m.planet_id = planets.id) as moon_count from planets
  expected: |
    select id,
           (
             select count(*)
               from moons m
              where m.planet_id = planets.id
           ) as moon_count
      from planets
- description: a subquery wrapped in a function in the select list stays inline
  input: select id, coalesce((select max(mass) from moons m where m.planet_id = planets.id), 0) as top from planets
  expected: |
    select id,
           coalesce((select max(mass) from moons m where m.planet_id = planets.id), 0) as top
      from planets
- description: a subquery as a join table expands, alias and single ON on the ) line
  input: select p.id from planets p join (select star_id from nearby_stars) ns on ns.star_id = p.star_id
  expected: |
    select p.id
      from planets p
      join (
        select star_id
          from nearby_stars
      ) ns on ns.star_id = p.star_id
- description: a join-table subquery with a multi-condition ON keeps the ON river on the ) line
  input: select p.id from planets p join (select star_id from nearby_stars) ns on ns.star_id = p.star_id and ns.type = p.type
  expected: |
    select p.id
      from planets p
      join (
        select star_id
          from nearby_stars
      ) ns on ns.star_id = p.star_id
          and ns.type = p.type
- description: a standalone comment inside a from-subquery reflows at the inner content column
  input: |
    select x.id from (
      select id
      -- note inside
      from planets
    ) x
  expected: |
    select x.id
      from (
        select id
               -- note inside
          from planets
      ) x
- description: a comment inside a where-subquery (first condition) reflows recursively
  input: |
    select id from planets where star_id in (
      select star_id
      -- only the nearby ones
      from nearby_stars
    ) and status_id = 1
  expected: |
    select id
      from planets
     where star_id in (
       select star_id
              -- only the nearby ones
         from nearby_stars
     )
       and status_id = 1
- description: a comment inside a join-table subquery reflows recursively
  input: |
    select p.id from planets p join (
      select star_id
      -- nearby only
      from nearby_stars
    ) v on ns.star_id = p.star_id
  expected: |
    select p.id
      from planets p
      join (
        select star_id
               -- nearby only
          from nearby_stars
      ) v on ns.star_id = p.star_id
- description: a comment inside a scalar subquery in the select list reflows recursively
  input: |
    select id, (
      select count(*)
      -- count of moons
      from moons m where m.planet_id = planets.id
    ) as moon_count from planets
  expected: |
    select id,
           (
             select count(*)
                    -- count of moons
               from moons m
              where m.planet_id = planets.id
           ) as moon_count
      from planets
- description: a comment inside a non-first where-subquery now reflows
  input: |-
    select id from planets where status_id = 1 and star_id in (
      select star_id
      -- must not vanish
      from nearby_stars
    )
  expected: |
    select id
      from planets
     where status_id = 1
       and star_id in (
         select star_id
                -- must not vanish
           from nearby_stars
       )
- description: a comment inside a function-wrapped subquery passes through intact
  input: |
    select id, coalesce((
      select max(mass)
      -- careful
      from moons m where m.planet_id = planets.id
    ), 0) as top from planets
  expected: |
    select id, coalesce((
      select max(mass)
      -- careful
      from moons m where m.planet_id = planets.id
    ), 0) as top from planets
