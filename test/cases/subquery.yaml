- description: from ( subquery ) alias expands, closing ) aligned under from
  input: select x.id, x.total from (select id, sum(mass) as total from planet group by id) x where x.total > 100
  expected: |
    select x.id,
           x.total
      from (
        select id,
               sum(mass) as total
          from planet
         group by id
      ) x
     where x.total > 100
- description: a single CTE body expands, closing ) aligned under with
  input: with recent as (select id from planet where created_at > now() - interval '7 days') select id from recent
  expected: |
    with recent as (
      select id
        from planet
       where created_at > now() - interval '7 days'
    )
    select id
      from recent
- description: where ... in ( subquery ) expands under the where keyword
  input: select id from planet where star_id in (select star_id from nearby_stars where is_active = true)
  expected: |
    select id
      from planet
     where star_id in (
       select star_id
         from nearby_stars
        where is_active = true
     )
- description: nested subqueries expand recursively
  input: select t.id from (select id from (select id from planet where status_id = 1) inner_q where id > 0) t
  expected: |
    select t.id
      from (
        select id
          from (
            select id
              from planet
             where status_id = 1
          ) inner_q
         where id > 0
      ) t
- description: a subquery containing a multi-condition join keeps the ON river
  input: select x.id from (select p.id from planet p join star s on s.id = p.star_id and s.is_active = true) x
  expected: |
    select x.id
      from (
        select p.id
          from planet p
          join star s on s.id = p.star_id
                     and s.is_active = true
      ) x
- description: a subquery in the first of several where conditions expands, rest below
  input: select id from planet where star_id in (select star_id from nearby_stars where is_active = true) and status_id = 1
  expected: |
    select id
      from planet
     where star_id in (
       select star_id
         from nearby_stars
        where is_active = true
     )
       and status_id = 1
- description: a subquery in a non-first where condition expands, ) under the connector
  input: select id from planet where status_id = 1 and star_id in (select star_id from nearby_stars where is_active = true)
  expected: |
    select id
      from planet
     where status_id = 1
       and star_id in (
         select star_id
           from nearby_stars
          where is_active = true
       )
- description: a subquery in a multi-condition join ON expands, ) under the connector
  input: select p.id from planet p join star s on s.id = p.star_id and s.id in (select id from nearby_stars)
  expected: |
    select p.id
      from planet p
      join star s on s.id = p.star_id
                 and s.id in (
                   select id
                     from nearby_stars
                 )
- description: a scalar subquery in the select list expands at the item column
  input: select id, (select count(*) from moon m where m.planet_id = planet.id) as moon_count from planet
  expected: |
    select id,
           (
             select count(*)
               from moon m
              where m.planet_id = planet.id
           ) as moon_count
      from planet
- description: a subquery wrapped in a function in the select list stays inline
  input: select id, coalesce((select max(mass) from moon m where m.planet_id = planet.id), 0) as top from planet
  expected: |
    select id,
           coalesce((select max(mass) from moon m where m.planet_id = planet.id), 0) as top
      from planet
- description: a subquery as a join table expands, alias and single ON on the ) line
  input: select p.id from planet p join (select star_id from nearby_stars) ns on ns.star_id = p.star_id
  expected: |
    select p.id
      from planet p
      join (
        select star_id
          from nearby_stars
      ) ns on ns.star_id = p.star_id
- description: a join-table subquery with a multi-condition ON keeps the ON river on the ) line
  input: select p.id from planet p join (select star_id from nearby_stars) ns on ns.star_id = p.star_id and ns.type = p.type
  expected: |
    select p.id
      from planet p
      join (
        select star_id
          from nearby_stars
      ) ns on ns.star_id = p.star_id
          and ns.type = p.type
