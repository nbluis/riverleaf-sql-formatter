# Comment placement: inline (trailing code) and standalone (own line) comments in
# lists and where conditions, leading comments (per statement), comments between
# clauses / items / conditions, inside parenthesized groups (BLOCK), before the
# first where condition, in a join ON, and after the final ';'.
- description: trailing line comment is kept
  input: select mass from stars -- snapshot
  expected: |
    select mass
      from stars -- snapshot
- description: trailing line comment on a where condition is kept
  input: select id from planets where status_id = 1 -- only active planets
  expected: |
    select id
      from planets
     where status_id = 1 -- only active planets
- description: line comment after a select column is kept as an end-of-line comment while the rest is formatted
  input: |-
    select star_id, -- primary key
           mass
      from planets
  expected: |
    select star_id, -- primary key
           mass
      from planets
- description: an inline comment on the last select column is kept while the list breaks
  input: |
    select planets.discovered_at as discovered_date, planets.discovered_at as date, planets.galaxy_id -- last token comment
      from planets
  expected: |
    select planets.discovered_at as discovered_date,
           planets.discovered_at as date,
           planets.galaxy_id -- last token comment
      from planets
- description: an inline comment in the middle of a where breaks and stays on its condition line
  input: |
    select id from planets where status_id = 1 -- filter
    and mass > 0
  expected: |
    select id
      from planets
     where status_id = 1 -- filter
       and mass > 0
- description: an inline comment on the last where condition rides its line when the where breaks
  input: select id from planets where status_id = 1 and mass > 0 -- note
  expected: |
    select id
      from planets
     where status_id = 1
       and mass > 0 -- note
- description: a leading line comment stays on its own line and does not pollute the river
  input: |
    -- comment
    select planets.discovered_at as discovered_date, planets.discovered_at as date, planets.galaxy_id
      from planets
  expected: |
    -- comment
    select planets.discovered_at as discovered_date,
           planets.discovered_at as date,
           planets.galaxy_id
      from planets
- description: each statement keeps its own leading comment, separated by a blank line
  input: |
    -- first query
    select id from planets;
    -- second query
    select star_id from stars
  expected: |
    -- first query
    select id
      from planets;

    -- second query
    select star_id
      from stars
- description: a standalone comment between clauses sits at the content column
  input: |
    select star_id from planets
    -- only active planets
    where status_id = 1
  expected: |
    select star_id
      from planets
           -- only active planets
     where status_id = 1
- description: a standalone comment between list items and a trailing statement comment sit at the content column
  input: |
    select planets.discovered_at as discovered_date, planets.discovered_at as date,
           -- line with comment
           planets.galaxy_id
      from planets
    -- line with comment
  expected: |
    select planets.discovered_at as discovered_date,
           planets.discovered_at as date,
           -- line with comment
           planets.galaxy_id
      from planets
           -- line with comment
- description: a standalone comment between where conditions sits at the content column
  input: |
    select id from planets
    where status_id = 1
    -- standalone note
    and mass > 0
  expected: |
    select id
      from planets
     where status_id = 1
           -- standalone note
       and mass > 0
- description: a standalone comment before the first where condition keeps where alone (option b)
  input: |
    select id from planets
    where
    -- standalone note before first
    status_id = 1
    and mass > 0
  expected: |
    select id
      from planets
     where
           -- standalone note before first
           status_id = 1
       and mass > 0
- description: a standalone comment between join ON conditions reflows under the on river
  input: |
    select id from planets p
    join stars s on s.id = p.star_id
    -- note between on conditions
    and s.is_active = true
  expected: |
    select id
      from planets p
      join stars s on s.id = p.star_id
                      -- note between on conditions
                  and s.is_active = true
- description: a standalone comment inside a parenthesized group reflows in BLOCK mode
  input: |
    select id from planets
    where (status_id = 1
    -- inside the group
    or status_id = 2)
    and mass > 0
  expected: |
    select id
      from planets
     where (
             status_id = 1
             -- inside the group
          or status_id = 2
           )
       and mass > 0
- description: an inline comment on a condition inside a parenthesized group is kept
  input: |
    select id from planets
    where (status_id = 1
    or status_id = 2 -- second option
    )
    and mass > 0
  expected: |
    select id
      from planets
     where (
             status_id = 1
          or status_id = 2 -- second option
           )
       and mass > 0
- description: a leading standalone comment inside a parenthesized group is kept
  input: |
    select id from planets
    where (
    -- head of group
    status_id = 1
    or status_id = 2)
    and mass > 0
  expected: |
    select id
      from planets
     where (
             -- head of group
             status_id = 1
          or status_id = 2
           )
       and mass > 0
- description: a line comment after the final semicolon glues under the statement
  input: |
    select star_id from planets;
    -- done
  expected: |
    select star_id
      from planets;
    -- done
