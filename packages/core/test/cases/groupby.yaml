# GROUP BY grouping constructs (golden guard-rails, Phase 4): ROLLUP, CUBE, and
# GROUPING SETS. `rollup (`, `cube (`, and `grouping sets (` all keep a space
# before the '(' (they are keywords, not functions).
- description: group by rollup
  input: select classification, count(*) from planets group by rollup (classification)
  expected: |
    select classification,
           count(*)
      from planets
     group by rollup (classification)
- description: group by cube
  input: select classification, star_id, count(*) from planets group by cube (classification, star_id)
  expected: |
    select classification,
           star_id,
           count(*)
      from planets
     group by cube (classification, star_id)
- description: group by grouping sets
  input: select classification, count(*) from planets group by grouping sets ((classification), (star_id))
  expected: |
    select classification,
           count(*)
      from planets
     group by grouping sets ((classification), (star_id))
