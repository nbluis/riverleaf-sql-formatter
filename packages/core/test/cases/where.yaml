# where / having (RIVER): a single condition inline, a parenthesized group
# always expands (BLOCK), inner connectors left-aligned at the group's block start.
- description: a where with a single condition stays inline
  input: select id from planets where status_id = 1
  expected: |
    select id
      from planets
     where status_id = 1
- description: a where that is a single parenthesized group always expands (D-c)
  input: select id from planets where (status_id = 1 or status_id = 2)
  expected: |
    select id
      from planets
     where (
             status_id = 1
             or status_id = 2
           )
- description: an expanded OR group left-aligns its connectors at the group block start (RIVER, D1)
  input: select id from planets where (status_id = 1 or status_id = 2 or status_id = 3) and mass > 0
  expected: |
    select id
      from planets
     where (
             status_id = 1
             or status_id = 2
             or status_id = 3
           )
       and mass > 0
# IS [NOT] DISTINCT FROM: the FROM belongs to the operator, not a new clause (A2).
- description: is distinct from keeps its from (not a clause anchor)
  input: select id from planets where discovered_at is distinct from cataloged_at
  expected: |
    select id
      from planets
     where discovered_at is distinct from cataloged_at
- description: is not distinct from keeps its from
  input: select id from planets where discovered_at is not distinct from cataloged_at
  expected: |
    select id
      from planets
     where discovered_at is not distinct from cataloged_at
- description: is distinct from as one of several conditions (breaks only at and/or)
  input: select id from planets where discovered_at is distinct from cataloged_at and launched_at is not distinct from landed_at
  expected: |
    select id
      from planets
     where discovered_at is distinct from cataloged_at
       and launched_at is not distinct from landed_at
